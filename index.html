<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 95 Portfolio</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="desktop" aria-label="Desktop">
    <div class="desktop__pattern" aria-hidden="true"></div>
  </main>

  <footer class="taskbar" aria-label="Taskbar">
    <button class="start-button win95-button" type="button" aria-label="Start menu">
      <span class="start-button__logo" aria-hidden="true"></span>
      <span>Start</span>
    </button>

    <div class="taskbar__apps" aria-label="Open applications"></div>

    <div class="taskbar__clock win95-panel" aria-live="polite">
      <span id="clock">12:00 PM</span>
    </div>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
