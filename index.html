<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 95 Portfolio</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="desktop" aria-label="Desktop">
    <div class="desktop__pattern" aria-hidden="true"></div>
    <div class="desktop-icons" aria-label="Desktop icons">
      <button class="desktop-icon" type="button" data-app-id="recycle-bin">
        <img class="desktop-icon__image" src="./res/png/recycle_bin_empty-0.png" alt="" width="32" height="32">
        <span class="desktop-icon__label">Recycle Bin</span>
      </button>
      <button class="desktop-icon" type="button" data-app-id="my-computer">
        <img class="desktop-icon__image" src="./res/png/computer_explorer-0.png" alt="" width="32" height="32">
        <span class="desktop-icon__label">My Computer</span>
      </button>
      <button class="desktop-icon" type="button" data-app-id="documents">
        <img class="desktop-icon__image" src="./res/png/directory_open_file_mydocs_small-0.png" alt="" width="32" height="32">
        <span class="desktop-icon__label">Documents</span>
      </button>
      <button class="desktop-icon" type="button" data-app-id="browser">
        <img class="desktop-icon__image" src="./res/png/msie1-0.png" alt="" width="32" height="32">
        <span class="desktop-icon__label">Internet Explorer</span>
      </button>
    </div>
    <div id="window-layer" class="window-layer" aria-label="Open windows"></div>
    <section
      id="desktop-context-menu"
      class="context-menu context-menu--hidden"
      aria-label="Desktop context menu"
      aria-hidden="true"
    >
      <button class="context-menu__item" type="button" data-context-action="open-browser">Open Internet Explorer</button>
      <button class="context-menu__item" type="button" data-context-action="refresh-desktop">Refresh</button>
      <div class="context-menu__divider" aria-hidden="true"></div>
      <button class="context-menu__item" type="button" data-context-action="open-computer">Properties</button>
    </section>
  </main>

  <section
    id="start-menu"
    class="start-menu start-menu--hidden"
    aria-label="Start menu"
    aria-hidden="true"
  >
    <div class="start-menu__sidebar" aria-hidden="true">
      <span class="start-menu__brand-windows">Windows</span>
      <span class="start-menu__brand-version">95</span>
    </div>

    <div class="start-menu__content">
      <button class="start-menu__item" type="button" data-app-id="programs">
        <img class="start-menu__icon" src="./res/png/program_manager-0.png" alt="" width="22" height="22">
        <span>Programs</span>
      </button>
      <button class="start-menu__item" type="button" data-app-id="documents">
        <img class="start-menu__icon" src="./res/png/directory_open_file_mydocs_small-0.png" alt="" width="22" height="22">
        <span>Documents</span>
      </button>
      <button class="start-menu__item" type="button" data-app-id="notepad">
        <img class="start-menu__icon" src="./res/png/notepad-0.png" alt="" width="22" height="22">
        <span>Notepad</span>
      </button>
      <button class="start-menu__item" type="button" data-app-id="browser">
        <img class="start-menu__icon" src="./res/png/msie1-0.png" alt="" width="22" height="22">
        <span>Internet Explorer</span>
      </button>
      <button class="start-menu__item" type="button" data-app-id="portfolio">
        <img class="start-menu__icon" src="./res/png/briefcase-0.png" alt="" width="22" height="22">
        <span>Portfolio</span>
      </button>
      <button class="start-menu__item" type="button" data-app-id="contact">
        <img class="start-menu__icon" src="./res/png/message_envelope_open-0.png" alt="" width="22" height="22">
        <span>Contact</span>
      </button>
      <div class="start-menu__divider" aria-hidden="true"></div>
      <button class="start-menu__item" type="button" data-app-id="shutdown">
        <img class="start-menu__icon" src="./res/png/shut_down_normal-0.png" alt="" width="22" height="22">
        <span>Shut Down...</span>
      </button>
    </div>
  </section>

  <footer class="taskbar" aria-label="Taskbar">
    <button
      id="start-button"
      class="start-button win95-button"
      type="button"
      aria-label="Start menu"
      aria-controls="start-menu"
      aria-expanded="false"
    >
      <img class="start-button__logo" src="./res/png/windows-0.png" alt="" width="18" height="18">
      <span>Start</span>
    </button>

    <div id="taskbar-apps" class="taskbar__apps" aria-label="Open applications"></div>

    <div class="taskbar__clock win95-panel" aria-live="polite">
      <span id="clock">12:00 PM</span>
    </div>
  </footer>

  <section
    id="shutdown-screen"
    class="shutdown-screen shutdown-screen--hidden"
    aria-label="Shutdown screen"
    aria-hidden="true"
  ></section>

  <script type="module" src="./app.js"></script>
</body>
</html>
